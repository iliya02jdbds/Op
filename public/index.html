<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Arena</title>
<style>
  :root{
    --bg:#07060c; --panel:#0f0d18; --cyan:#3ee6d0; --magenta:#e23e9e; --gold:#e2b83e;
    --hp:#e2404a; --line:rgba(255,255,255,0.08); --text:#eef0f7; --dim:#8b8aa3;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0; padding:0; height:100%; overflow:hidden; background:var(--bg);
    font-family:'Segoe UI', system-ui, -apple-system, sans-serif; color:var(--text); touch-action:none;}
  #stage{position:relative; width:100%; height:100%;}
  canvas{display:block;}

  .glow-text{ text-shadow:0 0 14px rgba(62,230,208,.55), 0 0 2px rgba(62,230,208,.8); }

  /* ---------- overlays ---------- */
  .overlay{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; background:radial-gradient(circle at 50% 30%, rgba(30,20,45,.92), rgba(6,5,10,.97));
    backdrop-filter:blur(8px); transition:opacity .25s ease; z-index:30;}
  .overlay.hidden{opacity:0; pointer-events:none;}
  h1.title{font-size:30px; margin:0 0 6px; font-weight:800; letter-spacing:.06em;
    background:linear-gradient(90deg,var(--cyan),var(--magenta)); -webkit-background-clip:text;
    background-clip:text; color:transparent;}
  p.sub{margin:0 0 22px; color:var(--dim); font-size:13px; max-width:280px; line-height:1.8; letter-spacing:.02em;}
  input{font-size:15px; padding:13px 18px; border-radius:10px; border:1px solid var(--line);
    background:rgba(255,255,255,.05); color:var(--text); margin-bottom:16px; width:230px; text-align:center;
    letter-spacing:.04em;}
  input::placeholder{color:var(--dim);}
  button.btn{font-family:inherit; font-size:14px; font-weight:700; padding:14px 38px; border-radius:10px; border:1px solid transparent;
    cursor:pointer; background:linear-gradient(135deg, var(--cyan), #23a693); color:#07171a;
    box-shadow:0 8px 26px rgba(62,230,208,.25); text-transform:uppercase; letter-spacing:.08em;}
  button.btn:active{transform:scale(.96);}
  button.btn.ghost{background:transparent; border:1px solid var(--line); color:var(--dim); box-shadow:none; margin-top:12px;}
  .spinner{width:32px;height:32px;border-radius:50%;border:3px solid rgba(255,255,255,.1);
    border-top-color:var(--cyan); animation:spin .9s linear infinite; margin-bottom:18px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .lobbyCount{font-size:12px; color:var(--cyan); letter-spacing:.1em; margin-bottom:4px;}

  #loadError{position:fixed; inset:0; z-index:999; display:none; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; background:var(--bg); color:var(--text); padding:24px;}

  /* ---------- HUD ---------- */
  #hud{position:absolute; inset:0; pointer-events:none; z-index:10; display:none;}
  #hud.active{display:block;}
  .crosshair{position:absolute; top:50%; left:50%; width:22px; height:22px; margin:-11px 0 0 -11px;}
  .crosshair::before,.crosshair::after{content:''; position:absolute; background:rgba(255,255,255,.75);}
  .crosshair::before{left:50%; top:0; width:2px; height:100%; margin-left:-1px;}
  .crosshair::after{top:50%; left:0; height:2px; width:100%; margin-top:-1px;}

  .hpPanel{position:absolute; left:14px; bottom:14px; width:190px;}
  .hpName{font-size:11px; letter-spacing:.1em; color:var(--dim); margin-bottom:4px; text-transform:uppercase;}
  .hpBar{height:11px; border-radius:6px; background:rgba(255,255,255,.07); border:1px solid var(--line); overflow:hidden;}
  .hpFill{height:100%; width:100%; background:linear-gradient(90deg,var(--hp),#ff8a6a); transition:width .15s ease;}

  .playerList{position:absolute; top:14px; right:14px; width:150px; background:rgba(10,8,16,.55); border:1px solid var(--line);
    border-radius:10px; padding:8px; backdrop-filter:blur(4px);}
  .plRow{display:flex; align-items:center; gap:6px; font-size:10.5px; padding:3px 0; color:var(--text); opacity:.95;}
  .plDot{width:8px; height:8px; border-radius:50%; flex:0 0 auto;}
  .plName{flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .plRow.dead{opacity:.35; text-decoration:line-through;}
  .plKills{color:var(--gold); font-weight:700;}

  .killFeed{position:absolute; top:14px; left:14px; display:flex; flex-direction:column; gap:4px; max-width:220px;}
  .killMsg{font-size:11.5px; background:rgba(10,8,16,.6); border:1px solid var(--line); border-radius:6px; padding:5px 9px;
    color:var(--text); animation:fadeOut 3.2s forwards;}
  @keyframes fadeOut{0%{opacity:1;} 75%{opacity:1;} 100%{opacity:0;}}

  /* ---------- touch controls ---------- */
  .touchZone{position:absolute; bottom:0; z-index:20; pointer-events:auto;}
  #moveZone{left:0; width:46%; height:44%;}
  #lookZone{right:0; width:54%; height:100%; top:0;}
  .joyBase{position:absolute; width:96px; height:96px; border-radius:50%; background:rgba(255,255,255,.05);
    border:1px solid var(--line); display:none;}
  .joyNub{position:absolute; width:42px; height:42px; border-radius:50%; background:rgba(62,230,208,.35);
    border:1px solid var(--cyan); transform:translate(-50%,-50%);}
  #fireBtn{position:absolute; right:26px; bottom:34px; width:78px; height:78px; border-radius:50%; z-index:25; pointer-events:auto;
    background:radial-gradient(circle at 35% 30%, #ff6d6d, #a01c2c); border:2px solid rgba(255,255,255,.25);
    box-shadow:0 6px 22px rgba(226,64,74,.5); display:flex; align-items:center; justify-content:center;
    font-size:22px; color:#fff;}
  #fireBtn:active{transform:scale(.92);}

  @media (min-width: 900px){
    #moveZone,#lookZone,#fireBtn{display:none;}
  }
</style>
</head>
<body>
<div id="stage">

  <div id="hud">
    <div class="crosshair" id="crosshair"></div>
    <div class="hpPanel">
      <div class="hpName" id="hpName">YOU</div>
      <div class="hpBar"><div class="hpFill" id="hpFill"></div></div>
    </div>
    <div class="playerList" id="playerList"></div>
    <div class="killFeed" id="killFeed"></div>
  </div>

  <div class="overlay" id="menuOverlay">
    <h1 class="title glow-text">NEON ARENA</h1>
    <p class="sub">Free-for-all online arena shooter. Enter a callsign and find a match.</p>
    <input id="nameInput" placeholder="YOUR CALLSIGN" maxlength="14">
    <button class="btn" id="findBtn">FIND MATCH</button>
  </div>

  <div class="overlay hidden" id="waitOverlay">
    <div class="spinner"></div>
    <div class="lobbyCount" id="lobbyCount">0 / 8 PLAYERS</div>
    <p class="sub">Waiting for opponents... match starts automatically once enough players join.</p>
    <button class="btn ghost" id="cancelBtn">CANCEL</button>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <h1 class="title glow-text" id="endTitle">ROUND OVER</h1>
    <div id="scoreboard" style="margin:6px 0 22px; font-size:13px; color:var(--dim); line-height:2;"></div>
    <button class="btn" id="rematchBtn">REMATCH</button>
  </div>

  <div class="touchZone" id="moveZone">
    <div class="joyBase" id="moveBase"><div class="joyNub" id="moveNub"></div></div>
  </div>
  <div class="touchZone" id="lookZone"></div>
  <div id="fireBtn">🔫</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<style>
  #loadError button{font-family:inherit; font-size:14px; font-weight:700; padding:12px 30px; border-radius:10px; border:none;
    cursor:pointer; background:linear-gradient(135deg, var(--cyan), #23a693); color:#07171a; margin-top:16px;
    text-transform:uppercase; letter-spacing:.08em;}
</style>
<div id="loadError">
  <h2 class="glow-text" style="margin:0 0 10px;">Loading Failed</h2>
  <p style="max-width:320px; line-height:1.9; opacity:.85; font-size:13px;" id="loadErrorMsg">Connecting...</p>
  <button onclick="location.reload()">RETRY</button>
</div>

<script>
(function(){
  // ---------- Load THREE.js with CDN fallback ----------
  var loadErrorBox = document.getElementById('loadError');
  var loadErrorMsg = document.getElementById('loadErrorMsg');
  var CDNS = [
    'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js',
    'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js'
  ];
  function loadScript(url, onOk, onFail){
    var s = document.createElement('script');
    s.src = url; s.onload = onOk; s.onerror = onFail;
    document.head.appendChild(s);
  }
  function tryLoad(i){
    if(i >= CDNS.length){
      loadErrorMsg.textContent = 'Could not reach graphics CDN. Check your connection (a VPN may be required) and retry.';
      loadErrorBox.style.display = 'flex';
      return;
    }
    loadScript(CDNS[i], function(){
      if(typeof THREE === 'undefined'){ tryLoad(i+1); return; }
      try{ startGame(); }
      catch(e){
        loadErrorMsg.textContent = 'Unexpected error: ' + (e && e.message ? e.message : e);
        loadErrorBox.style.display = 'flex';
      }
    }, function(){ tryLoad(i+1); });
  }
  tryLoad(0);

  function startGame(){

  // ============================================================
  // CONSTANTS
  // ============================================================
  const ARENA_HALF = 17;
  const OBSTACLES = [
    {x: 6, z: 6, hw: 1.5, hd: 1.5, h: 2.1, color:0x1c2430},
    {x:-6, z: 6, hw: 1.5, hd: 1.5, h: 2.1, color:0x1c2430},
    {x: 6, z:-6, hw: 1.5, hd: 1.5, h: 2.1, color:0x1c2430},
    {x:-6, z:-6, hw: 1.5, hd: 1.5, h: 2.1, color:0x1c2430},
    {x: 0, z: 0, hw: 1.1, hd: 1.1, h: 1.4, color:0x241a2c},
    {x: 11,z: 0, hw: 1.0, hd: 2.4, h: 1.8, color:0x1c2430},
    {x:-11,z: 0, hw: 1.0, hd: 2.4, h: 1.8, color:0x1c2430},
  ];
  const MOVE_SPEED = 6.2;
  const PLAYER_RADIUS = 0.55;
  const FIRE_COOLDOWN = 320;
  const FIRE_RANGE = 45;
  const FIRE_DAMAGE = 20;
  const CAM_DIST = 5.2;
  const CAM_HEIGHT = 2.6;

  // ============================================================
  // UI refs
  // ============================================================
  const menuOverlay = document.getElementById('menuOverlay');
  const waitOverlay = document.getElementById('waitOverlay');
  const endOverlay = document.getElementById('endOverlay');
  const endTitle = document.getElementById('endTitle');
  const scoreboardEl = document.getElementById('scoreboard');
  const findBtn = document.getElementById('findBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const rematchBtn = document.getElementById('rematchBtn');
  const nameInput = document.getElementById('nameInput');
  const lobbyCountEl = document.getElementById('lobbyCount');
  const hud = document.getElementById('hud');
  const hpFill = document.getElementById('hpFill');
  const hpName = document.getElementById('hpName');
  const playerListEl = document.getElementById('playerList');
  const killFeedEl = document.getElementById('killFeed');
  const fireBtn = document.getElementById('fireBtn');
  const moveZone = document.getElementById('moveZone');
  const lookZone = document.getElementById('lookZone');
  const moveBase = document.getElementById('moveBase');
  const moveNub = document.getElementById('moveNub');

  try{
    if(window.Telegram && window.Telegram.WebApp){
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      const tgUser = window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
      if(tgUser && tgUser.first_name) nameInput.value = tgUser.first_name;
    }
  }catch(e){}

  // ============================================================
  // THREE.js scene
  // ============================================================
  const stage = document.getElementById('stage');
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x07060c);
  scene.fog = new THREE.Fog(0x07060c, 14, 42);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
  const renderer = new THREE.WebGLRenderer({ antialias:true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  stage.appendChild(renderer.domElement);

  window.addEventListener('resize', ()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // lights
  scene.add(new THREE.AmbientLight(0x2a2440, 1.1));
  const dirLight = new THREE.DirectionalLight(0xbcd6ff, 0.55);
  dirLight.position.set(10, 18, 6);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024,1024);
  scene.add(dirLight);
  const cyanLight = new THREE.PointLight(0x3ee6d0, 1.6, 30);
  cyanLight.position.set(-10, 5, -10);
  scene.add(cyanLight);
  const magentaLight = new THREE.PointLight(0xe23e9e, 1.6, 30);
  magentaLight.position.set(10, 5, 10);
  scene.add(magentaLight);

  // ground
  const groundMat = new THREE.MeshStandardMaterial({ color:0x0c0a16, roughness:0.9, metalness:0.1 });
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(ARENA_HALF*2+6, ARENA_HALF*2+6), groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  const grid = new THREE.GridHelper(ARENA_HALF*2, 24, 0x3ee6d0, 0x241d38);
  grid.position.y = 0.01;
  grid.material.opacity = 0.35;
  grid.material.transparent = true;
  scene.add(grid);

  // arena walls (visual boundary)
  const wallMat = new THREE.MeshStandardMaterial({ color:0x14101f, emissive:0x3ee6d0, emissiveIntensity:0.15, roughness:0.6 });
  [[0,-ARENA_HALF,ARENA_HALF*2+2,0.4],[0,ARENA_HALF,ARENA_HALF*2+2,0.4],
   [-ARENA_HALF,0,0.4,ARENA_HALF*2+2],[ARENA_HALF,0,0.4,ARENA_HALF*2+2]].forEach(([x,z,w,d])=>{
    const wall = new THREE.Mesh(new THREE.BoxGeometry(w,2.6,d), wallMat);
    wall.position.set(x,1.3,z);
    scene.add(wall);
  });

  // obstacles
  OBSTACLES.forEach(o=>{
    const mat = new THREE.MeshStandardMaterial({ color:o.color, roughness:0.7, emissive:0x3ee6d0, emissiveIntensity:0.06 });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(o.hw*2, o.h, o.hd*2), mat);
    mesh.position.set(o.x, o.h/2, o.z);
    mesh.castShadow = true; mesh.receiveShadow = true;
    scene.add(mesh);
  });

  // ============================================================
  // Player model factory
  // ============================================================
  function makeCharacter(colorHex){
    const group = new THREE.Group();
    const c = new THREE.Color(colorHex);

    const bodyMat = new THREE.MeshStandardMaterial({ color:c, roughness:0.45, metalness:0.15, emissive:c, emissiveIntensity:0.18 });
    const darkMat = new THREE.MeshStandardMaterial({ color:0x14121c, roughness:0.6 });

    const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.4, 0.85, 10), bodyMat);
    torso.position.y = 1.05;
    torso.castShadow = true;
    group.add(torso);

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 16), bodyMat);
    head.position.y = 1.72;
    head.castShadow = true;
    group.add(head);

    const visor = new THREE.Mesh(new THREE.BoxGeometry(0.34,0.08,0.06), new THREE.MeshStandardMaterial({color:0xffffff, emissive:c, emissiveIntensity:1.4}));
    visor.position.set(0, 1.74, 0.29);
    group.add(visor);

    const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.13,0.13,0.62,8), darkMat);
    legL.position.set(-0.16, 0.31, 0); legL.castShadow = true; group.add(legL);
    const legR = legL.clone(); legR.position.x = 0.16; group.add(legR);

    const armPivot = new THREE.Group();
    armPivot.position.set(0.4, 1.35, 0);
    group.add(armPivot);
    const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.1,0.55,8), bodyMat);
    arm.position.set(0,-0.25,0);
    arm.castShadow = true;
    armPivot.add(arm);

    const gun = new THREE.Mesh(new THREE.BoxGeometry(0.14,0.14,0.62), darkMat);
    gun.position.set(0.4, 1.18, 0.35);
    group.add(gun);
    const muzzleGlow = new THREE.Mesh(new THREE.SphereGeometry(0.05,8,8), new THREE.MeshStandardMaterial({color:c, emissive:c, emissiveIntensity:2}));
    muzzleGlow.position.set(0.4, 1.18, 0.68);
    muzzleGlow.visible = false;
    group.add(muzzleGlow);

    const ring = new THREE.Mesh(new THREE.RingGeometry(0.42,0.5,24), new THREE.MeshBasicMaterial({color:c, transparent:true, opacity:0.6, side:THREE.DoubleSide}));
    ring.rotation.x = -Math.PI/2;
    ring.position.y = 0.03;
    group.add(ring);

    scene.add(group);
    return { group, muzzleGlow };
  }

  // ============================================================
  // State
  // ============================================================
  let socket = null;
  let myId = null;
  let roomActive = false;
  let iAmAlive = true;
  const players = {}; // id -> { name,color,hp,alive,kills, mesh, muzzleGlow, x,y,z, yaw, targetX,targetZ,targetYaw }
  let mySpawnIndex = 0;

  let cameraYaw = 0;
  let cameraPitch = 0.18; // 0 = level, positive = looking down slightly

  const keys = {};
  window.addEventListener('keydown', e=>{ keys[e.code]=true; if(e.code==='Space'){ tryFire(); } });
  window.addEventListener('keyup', e=>{ keys[e.code]=false; });

  function aabbCollide(x,z){
    for(const o of OBSTACLES){
      if(x > o.x-o.hw-PLAYER_RADIUS && x < o.x+o.hw+PLAYER_RADIUS &&
         z > o.z-o.hd-PLAYER_RADIUS && z < o.z+o.hd+PLAYER_RADIUS) return true;
    }
    return false;
  }

  function clampArena(x,z){
    const lim = ARENA_HALF - 0.6;
    return [Math.max(-lim,Math.min(lim,x)), Math.max(-lim,Math.min(lim,z))];
  }

  // ============================================================
  // Touch / mouse controls
  // ============================================================
  let moveVec = {x:0,y:0};
  let moveTouchId = null;
  const moveBaseRect = {x:0,y:0};

  function setMoveBase(cx,cy){
    moveBaseRect.x = cx; moveBaseRect.y = cy;
    moveBase.style.left = (cx-48)+'px';
    moveBase.style.top = (cy-48)+'px';
    moveBase.style.display = 'block';
  }
  function updateMoveNub(dx,dy){
    const max = 40;
    const len = Math.hypot(dx,dy) || 1;
    const cl = Math.min(len,max);
    const nx = dx/len*cl, ny = dy/len*cl;
    moveNub.style.left = (48+nx)+'px';
    moveNub.style.top = (48+ny)+'px';
    moveVec.x = nx/max; moveVec.y = -ny/max;
  }
  function resetMove(){
    moveVec.x=0; moveVec.y=0; moveTouchId=null;
    moveBase.style.display='none';
    moveNub.style.left='48px'; moveNub.style.top='48px';
  }

  moveZone.addEventListener('pointerdown', e=>{
    moveTouchId = e.pointerId;
    setMoveBase(e.clientX, e.clientY);
    updateMoveNub(0,0);
  });
  window.addEventListener('pointermove', e=>{
    if(e.pointerId===moveTouchId){
      updateMoveNub(e.clientX-moveBaseRect.x, e.clientY-moveBaseRect.y);
    }
    if(e.pointerId===lookTouchId){
      const dx = e.clientX-lookLast.x, dy = e.clientY-lookLast.y;
      lookLast.x = e.clientX; lookLast.y = e.clientY;
      cameraYaw -= dx*0.0045;
      cameraPitch = Math.max(-0.15, Math.min(0.7, cameraPitch + dy*0.003));
    }
  });
  window.addEventListener('pointerup', e=>{
    if(e.pointerId===moveTouchId) resetMove();
    if(e.pointerId===lookTouchId) lookTouchId=null;
  });

  let lookTouchId = null;
  let lookLast = {x:0,y:0};
  lookZone.addEventListener('pointerdown', e=>{
    lookTouchId = e.pointerId;
    lookLast.x = e.clientX; lookLast.y = e.clientY;
  });

  // desktop mouse look (drag anywhere on canvas)
  let mouseDown = false;
  renderer.domElement.addEventListener('pointerdown', e=>{
    mouseDown = true; lookLast.x=e.clientX; lookLast.y=e.clientY; lookTouchId = e.pointerId;
  });
  window.addEventListener('pointerup', ()=>{ mouseDown=false; });

  fireBtn.addEventListener('pointerdown', e=>{ e.stopPropagation(); tryFire(); });
  renderer.domElement.addEventListener('click', ()=>{ if(roomActive) tryFire(); });

  function getKeyboardMove(){
    let x=0,y=0;
    if(keys['KeyW']||keys['ArrowUp']) y+=1;
    if(keys['KeyS']||keys['ArrowDown']) y-=1;
    if(keys['KeyA']||keys['ArrowLeft']) x-=1;
    if(keys['KeyD']||keys['ArrowRight']) x+=1;
    return {x,y};
  }

  // ============================================================
  // Connect flow
  // ============================================================
  function connectSocket(){
    socket = io();
    socket.on('connect', ()=>{ myId = socket.id; });

    socket.on('waiting', ()=>{
      menuOverlay.classList.add('hidden');
      waitOverlay.classList.remove('hidden');
    });

    socket.on('lobbyUpdate', ({count,max})=>{
      lobbyCountEl.textContent = count+' / '+max+' PLAYERS';
    });

    socket.on('matchFound', (data)=>{
      setupMatch(data);
    });

    socket.on('rematchStart', (data)=>{
      endOverlay.classList.add('hidden');
      setupMatch(data, true);
    });

    socket.on('opponentState', (data)=>{
      const p = players[data.id];
      if(!p) return;
      p.targetX = data.x; p.targetZ = data.z; p.targetYaw = data.yaw;
    });

    socket.on('opponentShoot', (data)=>{
      const p = players[data.id];
      if(!p) return;
      flashMuzzle(p);
      drawTracer(data.ox,data.oy,data.oz, data.dx,data.dy,data.dz, p.colorHex);
    });

    socket.on('hpUpdate', ({targetId, hp})=>{
      const p = players[targetId];
      if(!p) return;
      p.hp = hp;
      if(targetId===myId) hpFill.style.width = Math.max(0,hp)+'%';
      refreshPlayerList();
    });

    socket.on('playerDown', ({targetId, killerId, killerName})=>{
      const p = players[targetId];
      if(p){
        p.alive = false;
        if(p.mesh) p.mesh.group.rotation.z = Math.PI/2.1;
      }
      if(targetId===myId) iAmAlive = false;
      const victimName = p ? p.name : '???';
      addKillMsg((killerName||'Someone') + ' eliminated ' + victimName);
      refreshPlayerList();
    });

    socket.on('opponentLeft', ({id})=>{
      const p = players[id];
      if(p && p.mesh){ scene.remove(p.mesh.group); }
      delete players[id];
      refreshPlayerList();
    });

    socket.on('matchOver', ({winnerId, scores})=>{
      roomActive = false;
      hud.classList.remove('active');
      const winner = scores.find(s=>s.id===winnerId);
      endTitle.textContent = winnerId===myId ? 'VICTORY' : (winner ? winner.name.toUpperCase()+' WINS' : 'DRAW');
      scores.sort((a,b)=>b.kills-a.kills);
      scoreboardEl.innerHTML = scores.map(s=> (s.id===myId?'<b style="color:var(--cyan)">':'') + s.name + ' — ' + s.kills + ' kills' + (s.id===myId?'</b>':'')).join('<br>');
      endOverlay.classList.remove('hidden');
    });
  }

  function setupMatch(data, isRematch){
    // clear old meshes
    Object.values(players).forEach(p=>{ if(p.mesh) scene.remove(p.mesh.group); });
    for(const k in players) delete players[k];

    waitOverlay.classList.add('hidden');
    menuOverlay.classList.add('hidden');
    endOverlay.classList.add('hidden');
    hud.classList.add('active');

    data.players.forEach(pd=>{
      const spawn = data.spawnPoints[pd.spawnIndex];
      const mesh = makeCharacter(pd.color);
      mesh.group.position.set(spawn.x, 0, spawn.z);
      players[pd.id] = {
        name: pd.name, colorHex: pd.color, hp: pd.hp, alive:true, kills:0,
        mesh, x:spawn.x, y:0, z:spawn.z, yaw:0, targetX:spawn.x, targetZ:spawn.z, targetYaw:0
      };
      if(pd.id===myId) mySpawnIndex = pd.spawnIndex;
    });

    iAmAlive = true;
    roomActive = true;
    hpFill.style.width = '100%';
    hpName.textContent = (nameInput.value.trim()||'YOU').toUpperCase();
    const mySpawn = data.spawnPoints[mySpawnIndex];
    cameraYaw = Math.atan2(-mySpawn.x, -mySpawn.z);
    refreshPlayerList();
  }

  function refreshPlayerList(){
    const rows = Object.entries(players).map(([id,p])=>{
      return '<div class="plRow'+(p.alive?'':' dead')+'">'+
        '<span class="plDot" style="background:'+p.colorHex+'"></span>'+
        '<span class="plName">'+p.name+(id===myId?' (you)':'')+'</span>'+
        '<span class="plKills">'+p.kills+'</span></div>';
    }).join('');
    playerListEl.innerHTML = rows;
  }

  function addKillMsg(text){
    const div = document.createElement('div');
    div.className = 'killMsg';
    div.textContent = text;
    killFeedEl.appendChild(div);
    setTimeout(()=>div.remove(), 3300);
  }

  findBtn.addEventListener('click', ()=>{
    if(!socket) connectSocket();
    const name = nameInput.value.trim() || 'Player';
    socket.emit('findMatch', { name });
  });
  cancelBtn.addEventListener('click', ()=>{
    if(socket) socket.emit('cancelFind');
    waitOverlay.classList.add('hidden');
    menuOverlay.classList.remove('hidden');
  });
  rematchBtn.addEventListener('click', ()=>{
    if(socket) socket.emit('rematch');
  });

  // ============================================================
  // Tracer & muzzle flash visuals
  // ============================================================
  function flashMuzzle(p){
    if(!p.mesh) return;
    p.mesh.muzzleGlow.visible = true;
    setTimeout(()=>{ if(p.mesh) p.mesh.muzzleGlow.visible = false; }, 60);
  }
  function drawTracer(ox,oy,oz,dx,dy,dz,colorHex){
    const end = new THREE.Vector3(ox+dx*20, oy+dy*20, oz+dz*20);
    const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(ox,oy,oz), end]);
    const mat = new THREE.LineBasicMaterial({ color:colorHex, transparent:true, opacity:0.85 });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    setTimeout(()=>scene.remove(line), 90);
  }

  // ============================================================
  // Ray-AABB intersection (slab method) for obstacle occlusion
  // ============================================================
  function rayObstacleDist(ox,oz,dx,dz,maxDist){
    let nearest = maxDist;
    for(const o of OBSTACLES){
      const minX=o.x-o.hw, maxX=o.x+o.hw, minZ=o.z-o.hd, maxZ=o.z+o.hd;
      let t0=0, t1=maxDist, hit=true;
      if(Math.abs(dx) < 1e-6){
        if(ox<minX||ox>maxX) hit=false;
      } else {
        let tx1=(minX-ox)/dx, tx2=(maxX-ox)/dx;
        if(tx1>tx2){const tmp=tx1;tx1=tx2;tx2=tmp;}
        t0=Math.max(t0,tx1); t1=Math.min(t1,tx2);
      }
      if(hit && Math.abs(dz) < 1e-6){
        if(oz<minZ||oz>maxZ) hit=false;
      } else if(hit){
        let tz1=(minZ-oz)/dz, tz2=(maxZ-oz)/dz;
        if(tz1>tz2){const tmp=tz1;tz1=tz2;tz2=tmp;}
        t0=Math.max(t0,tz1); t1=Math.min(t1,tz2);
      }
      if(hit && t0<=t1 && t0<nearest && t0>0) nearest = t0;
    }
    return nearest;
  }

  // ============================================================
  // Firing
  // ============================================================
  let lastFireTime = 0;
  function tryFire(){
    if(!roomActive || !iAmAlive) return;
    const now = performance.now();
    if(now - lastFireTime < FIRE_COOLDOWN) return;
    lastFireTime = now;

    const me = players[myId];
    if(!me) return;
    const fx = Math.sin(me.yaw), fz = Math.cos(me.yaw);
    const ox = me.x + fx*0.5, oy = 1.3, oz = me.z + fz*0.5;

    const obstacleDist = rayObstacleDist(ox,oz,fx,fz,FIRE_RANGE);

    let bestId=null, bestDist=obstacleDist;
    for(const id in players){
      if(id===myId) continue;
      const p = players[id];
      if(!p.alive) continue;
      // closest point on ray to target center (XZ plane)
      const tx = p.x-ox, tz = p.z-oz;
      const proj = tx*fx + tz*fz;
      if(proj < 0 || proj > bestDist) continue;
      const perpX = tx - fx*proj, perpZ = tz - fz*proj;
      const perpDist = Math.hypot(perpX,perpZ);
      if(perpDist < PLAYER_RADIUS+0.15 && proj < bestDist){
        bestDist = proj; bestId = id;
      }
    }

    flashMuzzle(me);
    drawTracer(ox,oy,oz, fx,0,fz, me.colorHex);
    socket.emit('shoot', { ox,oy,oz, dx:fx,dy:0,dz:fz });

    if(bestId){
      socket.emit('hit', { targetId: bestId, damage: FIRE_DAMAGE });
    }
  }

  // ============================================================
  // Camera
  // ============================================================
  function updateCamera(){
    const me = players[myId];
    if(!me) return;
    const fx = Math.sin(cameraYaw), fz = Math.cos(cameraYaw);
    const height = CAM_HEIGHT + cameraPitch*3.2;
    camera.position.set(me.x - fx*CAM_DIST, height, me.z - fz*CAM_DIST);
    camera.lookAt(me.x + fx*2, 1.3, me.z + fz*2);
  }

  // ============================================================
  // Update loop
  // ============================================================
  let lastTime = 0;
  function updateLocalPlayer(dt){
    const me = players[myId];
    if(!me) return;

    me.yaw = cameraYaw;
    if(me.mesh) me.mesh.group.rotation.y = cameraYaw;

    if(!iAmAlive) return;

    let mv = moveVec.x || moveVec.y ? moveVec : getKeyboardMove();
    if(Math.abs(mv.x) > 0.001 || Math.abs(mv.y) > 0.001){
      const fx = Math.sin(cameraYaw), fz = Math.cos(cameraYaw);
      const rx = Math.cos(cameraYaw), rz = -Math.sin(cameraYaw);
      let dx = (rx*mv.x + fx*mv.y);
      let dz = (rz*mv.x + fz*mv.y);
      const len = Math.hypot(dx,dz) || 1;
      dx/=len; dz/=len;
      let nx = me.x + dx*MOVE_SPEED*dt;
      let nz = me.z + dz*MOVE_SPEED*dt;
      [nx,nz] = clampArena(nx,nz);
      if(!aabbCollide(nx, me.z)) me.x = nx;
      if(!aabbCollide(me.x, nz)) me.z = nz;
      if(me.mesh) me.mesh.group.position.set(me.x, 0, me.z);
      socket && socket.emit('state', { x:me.x, z:me.z, yaw:me.yaw });
    }
  }

  function updateRemotePlayers(dt){
    for(const id in players){
      if(id===myId) continue;
      const p = players[id];
      const lerp = Math.min(1, dt*12);
      p.x += (p.targetX-p.x)*lerp;
      p.z += (p.targetZ-p.z)*lerp;
      let dyaw = p.targetYaw - p.yaw;
      while(dyaw > Math.PI) dyaw -= Math.PI*2;
      while(dyaw < -Math.PI) dyaw += Math.PI*2;
      p.yaw += dyaw*lerp;
      if(p.mesh){
        p.mesh.group.position.set(p.x, 0, p.z);
        p.mesh.group.rotation.y = p.yaw;
      }
    }
  }

  function animate(ts){
    requestAnimationFrame(animate);
    const dt = lastTime ? Math.min(0.05,(ts-lastTime)/1000) : 0.016;
    lastTime = ts;

    if(roomActive){
      updateLocalPlayer(dt);
      updateRemotePlayers(dt);
      updateCamera();
    }
    renderer.render(scene, camera);
  }
  requestAnimationFrame(animate);

  } // end startGame
})();
</script>
